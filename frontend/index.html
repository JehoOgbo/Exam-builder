<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamBuilder - Premium Exam Creation</title>
    <meta name="description" content="Create, manage, and print stunning exams with ExamBuilder.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="background-anim">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <h1>ExamBuilder</h1>
            <p>Elevate Your Assessments</p>
        </div>
        
        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login">Login</button>
            <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <form id="login-form" class="auth-form active-form">
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <form id="signup-form" class="auth-form">
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" required placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="Create a strong password">
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div id="auth-error" class="error-message hidden"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
