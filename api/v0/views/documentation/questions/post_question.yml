tags:
  - Questions
summary: Create a new question with an image upload
security:
  - Bearer: []
consumes:
  - multipart/form-data
parameters:
  - name: query
    in: formData
    type: string
    required: true
    description: The question text
  - name: section_id
    in: formData
    type: string
    required: true
    description: UUID of the section
  - name: image
    in: formData
    type: file
    description: The image file to upload
  - name: marks
    in: formData
    type: integer
    description: The marks allocated to the question
responses:
  201:
    description: Question created with image path saved
  400:
    description: Missing required form fields
