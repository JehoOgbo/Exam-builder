Updates a specific Question object
---
tags:
  - Questions
security:
  - Bearer: []
parameters:
  - name: question_id
    in: path
    description: ID of the question to update
    required: true
    type: string
  - name: image
    in: formData
    description: Optional new image file for the question
    type: file
  - name: query
    in: formData
    description: The text content of the question
    type: string
  - name: marks
    in: formData
    description: Marks allocated to the question
    type: integer
responses:
  200:
    description: Question updated successfully
    schema:
      properties:
        id:
          type: string
        text:
          type: string
        image_path:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
  400:
    description: Invalid input or missing required fields
  401:
    description: Missing or invalid JWT token
  404:
    description: Question not found
  409:
    description: Database conflict/integrity error
