Gets the list of all senders/users
---
tags:
  - User
description: Requires a valid JWT access token
security:
  - Bearer: []
responses:
  200:
    description: Successful request
    schema:
      type: array
      items:
        properties:
          __class__:
            type: string
            description: class of object of the instance
          created_at:
            type: string
            description: time of creation of the instance
          updated_at:
            type: string
            description: time of last update of last update of the instance
          id:
            type: string
            description: the uuid of the sender instance
          name:
            type: string
            description: the name of the user
          email:
            type: string
            description: email of the user
          phone_number:
            type: string
            description: phone_number of the user
          user_type:
            type: string
            description: shows whether user is a regular user or an admin
          image_path:
            type: string
            description: path to the user's profile picture
          saved_filename:
            type: string
            description: filename of the image file provided by the user
