Generates a formatted Exam PDF
---
description: Supports math fonts, images, and professional layout. Use ?mode=preview for browser view.
tags:
  - Exams
security:
  - Bearer: []
parameters:
  - name: exam_id
    in: path
    type: string
    required: true
  - name: mode
    in: query
    type: string
    enum: [download, preview]
    default: download
responses:
  200:
    description: PDF successfully generated
    content:
      application/pdf:
        schema:
          type: string
          format: binary
  404:
    description: Exam ID does not exist
