tags:
  - Sections
summary: Updates an existing section
parameters:
  - name: section_id
    in: path
    description: ID of the section to update
    required: true
    type: string
  - name: body
    in: body
    required: true
    schema:
      type: object
      properties:
        name:
          type: string
        instruction:
          type: string
responses:
  200:
    description: Section updated successfully
  404:
    description: Section not found
